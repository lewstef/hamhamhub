services:
  postgres:
    image: postgres:16-alpine
    container_name: hamhamhub-db
    restart: always
    environment:
      POSTGRES_USER: hamhamuser
      POSTGRES_PASSWORD: hamhampassword
      POSTGRES_DB: hamhamhub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
